---
name: 'prepare'
description: 'Composite action to setup java and gradle'

inputs:
  gradle-cache-read-only:
    description: 'Only restore Gradle cache entries without writing updates at the end of the job'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:

    - name: Set up JDK 25
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
      with:
        java-version: 25
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
      with:
        cache-read-only: ${{ inputs.gradle-cache-read-only }}
