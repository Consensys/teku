---
name: 'prepare'
description: 'Composite action to setup java and gradle'

runs:
  using: "composite"
  steps:

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c