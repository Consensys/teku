---
name: 'prepare'
description: 'Composite action to setup java and gradle'

inputs:
  gradle-cache-read-only:
    description: 'Only restore Gradle cache entries without writing updates at the end of the job'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:

    - name: Ensure zstd is available
      shell: bash
      run: |
        if ! command -v zstd > /dev/null 2>&1; then
          if [ "$(id -u)" -eq 0 ]; then
            apt=(apt-get)
          else
            apt=(sudo apt-get)
          fi
          "${apt[@]}" update
          "${apt[@]}" install --yes --no-install-recommends zstd
        fi

    - name: Set up JDK 25
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
      with:
        java-version: 25
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
      with:
        cache-read-only: ${{ inputs.gradle-cache-read-only }}
