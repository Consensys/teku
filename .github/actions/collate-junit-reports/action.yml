---
name: 'junit results'
description: 'Composite action to gather junit results'

inputs:
  stage_key:
    required: true

runs:
  using: "composite"
  steps:
    - name: Gather junit results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: ${{inputs.stage_key}}-reports-*
        path: reports/${{inputs.stage_key}}
        merge-multiple: true

    - shell: bash
      run: |
        ls -R reports/

    # # https://github.com/dorny/test-reporter
    #v2
    - name: Junit Test Reporter
      uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f
      env:
        NODE_OPTIONS: "--max_old_space_size=4096"      
      with:
        name: Combined ${{inputs.stage_key}} tests
        path: "reports/${{inputs.stage_key}}/**/TEST-*.xml"
        reporter: java-junit
        only-summary: 'false'
        list-tests: 'failed'
        list-suites: 'failed'
        use-actions-summary: 'true'
        # all/none/failed

    # Publish test report
    - name: Publish Summary of Test Reports
      uses: ctrf-io/github-test-reporter@024bc4b64d997ca9da86833c6b9548c55c620e40 # v1
      with:
        report-path: 'reports/${{inputs.stage_key}}/**/TEST-*.xml'
        integrations-config: |
          {
            "junit-to-ctrf": {
              "enabled": true,
              "action": "convert"
            }
          }
        # Disable PR interaction
        pull-request: false
        status-check: false
        update-comment: false
        overwrite-comment: true
        title: '${{inputs.stage_key}} test report'
        artifact-name: ctrf-${{inputs.stage_key}}-tests
        upload-artifact: true
        # generate reports
        suite-folded-report: false
        summary-report: true
        summary-delta-report: true
        failed-report: true
        fail-rate-report: true
        flaky-rate-report: true
        skipped-report: true
        # some aggregated analytics and trends (failures over time, etc)
        insights-report: true
        slowest-report: true
        # Enables a full test report type — typically lists all tests and their statuses, not just failed.
        test-report: false
        previous-results-report: true
        max-previous-runs-to-fetch: 10
        report-order: 'summary-report,summary-delta-report,failed-report,fail-rate-report,flaky-rate-report,slowest-report,skipped-report,insights-report,previous-results-report'
      env:
        GITHUB_TOKEN: ${{ github.token }}
