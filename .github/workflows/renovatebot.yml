name: renovatebot

on:
  schedule:
    - cron: "15 3 14,28 * *"
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovatebot-check:
    runs-on: ubuntu-24.04
    environment: security
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run renovatebot
        uses: ConsenSys/github-actions/renovatebot@7d0f1d5eac4c2c889f14bf4a72166d6be9f8bbbe # main
        with:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_PRIVATE_KEY: ${{ secrets.GH_PRIVATE_KEY }}
          GH_REPOSITORY: ${{ github.repository }}
