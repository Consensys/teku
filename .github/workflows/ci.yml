
name: ci

## RUNNERS
# https://docs.github.com/en/actions/reference/runners/github-hosted-runners
# ubuntu-24.04 = 4cpu, 16GB
# ubuntu-latest-128 = 32, 128GB
# ubuntu-24.04-arm = 4cpu, 16GB
# macos-13 = 4cpu, 14GB
# macos-15 = 3cpu(M1), 7GB
# gha-runner-scale-set-ubuntu-24-amd64-med   = 4 , 16G
# gha-runner-scale-set-ubuntu-24-amd64-large = 8 , 32G
# gha-runner-scale-set-ubuntu-24-amd64-xl = 16 , 64G
# gha-runner-scale-set-ubuntu-24-amd64-xxl = 32 , 128G

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master
      - '**prototype**'
      - '**devnet**'
  workflow_dispatch:
    inputs:
      include_hash_in_docker:
        description: 'include_hash_in_docker'
        required: false
        default: 'false'
      gradle_log_level:
        description: 'Gradle log level for test jobs'
        required: false
        type: choice
        default: 'lifecycle'
        options:
          - lifecycle
          - info
          - debug

# if a new commit is made, cancel this run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_TOOL_OPTIONS: -Xmx4096m
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4 -Xmx4096m

permissions: read-all

jobs:

  # ============================================================================
  # ** DOCS-ONLY SHORT-CIRCUIT (the `changes` gate) **
  # ----------------------------------------------------------------------------
  # WHAT: Skip the heavy CI pipeline when a PR/push changes ONLY docs-type files
  # (see the path list in the `changes` job below), while still satisfying the
  # required status checks on branch protection.
  #
  # HOW: `changes` diffs the PR/push and sets the output `code`, which every
  # gated job reads as needs.changes.outputs.code:
  #
  #     code == "true"   ->  FULL pipeline runs  (all gated jobs execute)
  #     code == "false"  ->  heavy jobs are SKIPPED  (docs-only short-circuit);
  #                          the test aggregators report success, so the required
  #                          checks (spotless, moduleChecks, assemble, unitTests,
  #                          integrationTests, propertyTests, referenceTests) go
  #                          green in seconds.
  #
  # code is "true" when any non-doc file changed, OR it's a tag build, OR a manual
  # (workflow_dispatch) run. It is "false" only for a docs-only push/PR.
  #
  # WHY ONE GATE (and not two workflows): this replaces the old
  # ci.yml + ci-skipped.yml pair. On a mixed (code + docs) PR BOTH of those fired,
  # emitting two status checks per required name and racing -- the no-op stub could
  # flip auto-merge green before the real CI finished. One gate => one check per
  # name => no race.
  #
  # IMPORTANT: ci.yml must NOT use `paths-ignore`. A job skipped via `if:` counts
  # as a PASSING required check, but a whole workflow skipped by a path filter
  # leaves its required checks stuck on "Expected" forever and blocks merge.
  # ============================================================================
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Detect non-doc changes
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          FORCE_FULL_CI: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
        run: |
          set -uo pipefail

          emit() { echo "code=$1" >> "$GITHUB_OUTPUT"; echo "Result: code=$1"; exit 0; }

          is_doc_path() {
            local f="$1"
            # List of doc-classified changes
            case "$f" in
              *.md | \
              CODEOWNERS | \
              .gitignore | \
              .gitattributes | \
              .codespell/* | \
              specrefs/* | \
              mlc_config.json) return 0 ;;
              LICENSE* | \
              NOTICE* | \
              CHANGELOG*) [[ "$f" != */* ]] ;;
              *) return 1 ;;
            esac
          }

          if [ "$FORCE_FULL_CI" = "true" ]; then
            echo "Tag or manual run; running full pipeline."
            emit true
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
            diff_args=("$base...$head")
          else
            base="$BEFORE_SHA"
            head="$CURRENT_SHA"
            diff_args=("$base" "$head")
          fi
          # Without a usable base (new branch/tag, force-push) we cannot diff: run full.
          if [ -z "${base:-}" ] || [ -z "${head:-}" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable base/head ('${base:-}'/'${head:-}'); running full pipeline."
            emit true
          fi
          if ! changed="$(git diff --name-only "${diff_args[@]}")"; then
            echo "git diff failed for base '$base' and head '$head'; running full pipeline."
            emit true
          fi
          echo "Changed files:"
          echo "$changed"

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! is_doc_path "$f"; then
              echo "Non-doc file changed: $f"
              emit true
            fi
          done <<< "$changed"
          emit false

  spotless:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Spotless
        run: |
          ./gradlew spotlessCheck

  moduleChecks:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Check modules
        run: |
          ./gradlew checkMavenCoordinateCollisions checkModuleDependencies

  assemble:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # assemble is in our critical path so we want it to finish as quick as possible
    runs-on: ubuntu-latest-128
    outputs:
      workflow-run-id: ${{ steps.workflowdetails.outputs.run_id }}
      publish-version: ${{ steps.projectDetails.outputs.publish-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: 'recursive'
      - name: get workflow_details
        id: workflowdetails
        shell: bash
        run: |
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "build_date=$(date --rfc-3339=date)" >> $GITHUB_OUTPUT
          echo "vcs_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Determine Teku version
        id: projectDetails
        uses: ./.github/actions/get-project-version
      - name: Assemble
        shell: bash
        run: |
          ./gradlew clean compileJava compileTestJava compileJmhJava compileIntegrationTestJava compileAcceptanceTestJava compilePropertyTestJava resolveCiDependencies assemble
      - name: Upload distribution tar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: distribution-tar
          path: |
            build/distributions/*.tar.gz
          retention-days: 14
      - name: Upload distribution zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: distribution-zip
          path: |
            build/distributions/*.zip
          retention-days: 7
      - name: Upload workspace build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: assemble-output
          path: |
            ./
            !./.git/**
          retention-days: 1
          include-hidden-files: 'true'

  ## OpenAPI spec
  extractAPISpec:
    needs: assemble
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Download assemble-output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          name: assemble-output
          merge-multiple: true
      - name: Build runnable Teku binaries
        shell: bash
        run: |
          ./gradlew --no-daemon --parallel installDist
      - name: Extract OpenAPI spec
        shell: bash
        run: |
          mkdir -p .openapidoc/spec

          build/install/teku/bin/teku --network=mainnet --ee-endpoint=unsafe-test-stub --ignore-weak-subjectivity-period-enabled --Xinterop-enabled=true --rest-api-enabled=true --rest-api-docs-enabled=true 2>&1 > teku_output.log &
          TEKU_PID=$!

          EXIT_CODE=0
          wget --timeout=30 --retry-connrefused --output-document=.openapidoc/spec/teku.json http://localhost:5051/swagger-docs
          if [ $? != 0 ]; then
            EXIT_CODE=1
          fi

          kill $TEKU_PID
          exit $EXIT_CODE
      - name: Upload openapi spec
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openapi-spec
          path: |
            .openapidoc/spec/teku.json
          retention-days: 7

  publishAPISpec:
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    needs: extractAPISpec
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Download openapi spec
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openapi-spec
          path: ${{ github.workspace }}/.openapidoc/spec
      - name: List openapidoc spec
        run: |
          ls -R .openapidoc/spec/
      - name: Use Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache-dependency-path: .openapidoc/package-lock.json
          cache: 'npm'
      - name: Setup Git identity
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
      - name: Install npm dependencies
        working-directory: .openapidoc
        run: |
          npm ci
          OA_GIT_USERNAME="${{ github.actor }}" \
          OA_GIT_EMAIL="${{ github.actor }}@users.noreply.github.com" \
          OA_GIT_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
          OA_GH_PAGES_BRANCH="gh-pages" \
          node publish.js

  ## Tests
  unitTests:
    needs: assemble
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/matrix-tests-template.yml
    with:
      assemble_output_run_id: ${{ github.run_id }}
      stage_name: Unit Tests
      stage_key: unit
      gradle_task: test
      src_pattern: "*/src/test/java/*"
      src_root: "src/test/java"
      runner: "gha-runner-scale-set-ubuntu-24-amd64-large"
      gradle_args: ${{ (inputs.gradle_log_level == 'info' && '--info') || (inputs.gradle_log_level == 'debug' && '--debug') || '' }}

  unitTestsResult:
    name: unitTests
    runs-on: ubuntu-24.04
    needs: [changes, unitTests]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.changes.result }}" = "success" ] && [ "${{ needs.changes.outputs.code }}" = "false" ]; then
            echo "⏭️ Docs-only change; unitTests not required."
            exit 0
          fi
          echo "unitTests result: ${{ needs.unitTests.result }}"
          if [ "${{ needs.unitTests.result }}" != "success" ]; then
            echo "❌ One or more unitTests matrix jobs failed."
            exit 1
          fi
          echo "✅ All unitTests matrix jobs passed."

  unitTestsReport:
    runs-on: ubuntu-24.04
    needs: [changes, unitTests]
    if: always() && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/collate-junit-reports
        continue-on-error: true
        if: always()
        with:
          stage_key: unit

  integrationTests:
    needs: assemble
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/matrix-tests-template.yml
    with:
      assemble_output_run_id: ${{ github.run_id }}
      stage_name: Integration Tests
      stage_key: integration
      gradle_task: integrationTest
      src_pattern: "*/src/integration-test/java/*"
      src_root: "src/integration-test/java"
      runner: "gha-runner-scale-set-ubuntu-24-amd64-large"
      gradle_args: ${{ (inputs.gradle_log_level == 'info' && '--info') || (inputs.gradle_log_level == 'debug' && '--debug') || '' }}

  integrationTestsResult:
    name: integrationTests
    runs-on: ubuntu-24.04
    needs: [changes, integrationTests]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.changes.result }}" = "success" ] && [ "${{ needs.changes.outputs.code }}" = "false" ]; then
            echo "⏭️ Docs-only change; integrationTests not required."
            exit 0
          fi
          echo "integrationTests result: ${{ needs.integrationTests.result }}"
          if [ "${{ needs.integrationTests.result }}" != "success" ]; then
            echo "❌ One or more integrationTests matrix jobs failed."
            exit 1
          fi
          echo "✅ All integrationTests matrix jobs passed."

  integrationTestsReport:
    runs-on: ubuntu-24.04
    needs: [changes, integrationTests]
    if: always() && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/collate-junit-reports
        continue-on-error: true
        if: always()
        with:
          stage_key: integration

  propertyTests:
    needs: assemble
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/matrix-tests-template.yml
    with:
      assemble_output_run_id: ${{ github.run_id }}
      stage_name: Property Tests
      stage_key: property
      gradle_task: propertyTest
      src_pattern: "*/src/property-test/java/*"
      src_root: "src/property-test/java"
      runner: "gha-runner-scale-set-ubuntu-24-amd64-xl"
      gradle_args: ${{ (inputs.gradle_log_level == 'info' && '--info') || (inputs.gradle_log_level == 'debug' && '--debug') || '' }}

  propertyTestsResult:
    name: propertyTests
    runs-on: ubuntu-24.04
    needs: [changes, propertyTests]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.changes.result }}" = "success" ] && [ "${{ needs.changes.outputs.code }}" = "false" ]; then
            echo "⏭️ Docs-only change; propertyTests not required."
            exit 0
          fi
          echo "propertyTests result: ${{ needs.propertyTests.result }}"
          if [ "${{ needs.propertyTests.result }}" != "success" ]; then
            echo "❌ One or more propertyTests matrix jobs failed."
            exit 1
          fi
          echo "✅ All propertyTests matrix jobs passed."

  propertyTestsReport:
    runs-on: ubuntu-24.04
    needs: [changes, propertyTests]
    if: always() && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/collate-junit-reports
        continue-on-error: true
        if: always()
        with:
          stage_key: property

  acceptanceTests:
    needs: assemble
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/matrix-tests-template.yml
    with:
      assemble_output_run_id: ${{ github.run_id }}
      stage_name: Acceptance Tests
      stage_key: acceptance
      gradle_task: acceptanceTest
      src_pattern: "*/src/acceptance-test/java/*"
      src_root: "src/acceptance-test/java"
      runner: "ubuntu-latest-128"
      gradle_args: ${{ (inputs.gradle_log_level == 'info' && '--info') || (inputs.gradle_log_level == 'debug' && '--debug') || '' }}

  acceptanceTestsResult:
    name: acceptanceTests
    runs-on: ubuntu-24.04
    needs: [changes, acceptanceTests]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.changes.result }}" = "success" ] && [ "${{ needs.changes.outputs.code }}" = "false" ]; then
            echo "⏭️ Docs-only change; acceptanceTests not required."
            exit 0
          fi
          echo "acceptanceTests result: ${{ needs.acceptanceTests.result }}"
          if [ "${{ needs.acceptanceTests.result }}" != "success" ]; then
            echo "❌ One or more acceptanceTests matrix jobs failed."
            exit 1
          fi
          echo "✅ All acceptanceTests matrix jobs passed."

  acceptanceTestsReport:
    runs-on: ubuntu-24.04
    needs: [changes, acceptanceTests]
    if: always() && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/collate-junit-reports
        continue-on-error: true
        if: always()
        with:
          stage_key: acceptance

  referenceTestsPrep:
    needs: assemble
    runs-on: ubuntu-latest-128
    outputs:
      cache-key: ${{ steps.ref-cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Download assemble-output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          name: assemble-output
          merge-multiple: true
          path: ${{ github.workspace }}
      - name: Compute reference test cache key
        id: ref-cache-key
        shell: bash
        run: |
          # Derive the cache key from the refTestVersion definition only, so unrelated
          # build.gradle edits don't bust the consensus-spec-tests fixtures cache.
          LINE=$(grep -E '^def refTestVersion' build.gradle)
          if [ -z "$LINE" ]; then
            echo "Could not find refTestVersion definition in build.gradle" >&2
            exit 1
          fi
          HASH=$(echo -n "$LINE" | sha256sum | cut -c1-16)
          echo "key=reftests-$HASH" >> "$GITHUB_OUTPUT"
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: eth-reference-tests/src/referenceTest/resources/consensus-spec-tests/
          key: ${{ steps.ref-cache-key.outputs.key }}
      - shell: bash
        run: |
          ls -R ./eth-reference-tests/
      - name: FetchReferenceTests
        shell: bash
        run: |
          if [ ! -d "eth-reference-tests/src/referenceTest/resources/consensus-spec-tests/tests" ]
          then
            ./gradlew --no-daemon expandRefTests
          fi
      - name: CompileReferenceTests
        shell: bash
        run: |
          ./gradlew --no-daemon --parallel compileReferenceTestJava resolveCiDependencies
      - name: Caching reference tests
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: eth-reference-tests/src/referenceTest/resources/consensus-spec-tests/
          key: ${{ steps.ref-cache-key.outputs.key }}
      - name: Compress reftests
        shell: bash
        run: |
          tar -cf reftests.tar ./eth-reference-tests/
      - name: Upload reftests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reftests
          path: reftests.tar
          retention-days: 1

  referenceTests:
    needs: referenceTestsPrep
    runs-on: "gha-runner-scale-set-ubuntu-24-amd64-xxl"
    strategy:
      fail-fast: false
      matrix:
        shard: [0,1,2,3,4,5,6,7]   # parallel shards
        total: [8]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          gradle-cache-read-only: 'true'
      - name: Download assemble-output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          name: assemble-output
          merge-multiple: true
          path: ${{ github.workspace }}
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: eth-reference-tests/src/referenceTest/resources/consensus-spec-tests/
          key: ${{ needs.referenceTestsPrep.outputs.cache-key }}
      - name: Download reftests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          name: reftests
      - name: Extract reftests
        shell: bash
        run: |
          tar -xf reftests.tar
          rm reftests.tar
      - name: Compute shard ${{ matrix.shard }} of ${{ matrix.total }} for ReferenceTests
        id: shard
        shell: bash
        run: |
          SRC_PATTERN="*/src/referenceTest/generated_tests/*Test.java"
          SRC_ROOT="src/referenceTest/generated_tests"
          # 1) Collect test classes by pattern = FQNs
          CLASSNAMES=$(find . -type f -name "*.java" -path "$SRC_PATTERN" \
            | sed "s@.*/$SRC_ROOT/@@" \
            | sed 's@/@.@g' \
            | sed 's/.\{5\}$//' \
            | sort)
          # 2) Modulo split
          CLASSES_FOR_SHARD=$(printf "%s\n" "$CLASSNAMES" \
            | awk -v shards=${{ matrix.total }} -v shard=${{ matrix.shard }} '((NR-1) % shards) == shard')

          if [ -z "$CLASSES_FOR_SHARD" ]; then
            echo "args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 3) Build --tests args
          GRADLE_ARGS=$(printf "%s\n" "$CLASSES_FOR_SHARD" | awk '{printf "--tests %s ", $0}')
          echo "Prepared arguments for Gradle (ReferenceTests): $GRADLE_ARGS"
          echo "args=$GRADLE_ARGS" >> "$GITHUB_OUTPUT"
      - name: Run ReferenceTests (shard)
        if: steps.shard.outputs.args != ''
        run: |
          ./gradlew --no-daemon --parallel --info \
            -x generateReferenceTestClasses \
            -x processReferenceTestResources \
            -x cleanReferenceTestClasses \
            referenceTest ${{ inputs.gradle_args }} ${{ steps.shard.outputs.args }}
      - name: Upload JUnit XML + HTML for ReferenceTests
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: reference-reports-${{ matrix.shard }}
          path: |
            **/build/test-results/**/TEST-*.xml
            **/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 1

  referenceTestsResult:
    name: referenceTests
    runs-on: ubuntu-24.04
    needs: [changes, referenceTests]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.changes.result }}" = "success" ] && [ "${{ needs.changes.outputs.code }}" = "false" ]; then
            echo "⏭️ Docs-only change; referenceTests not required."
            exit 0
          fi
          echo "referenceTests result: ${{ needs.referenceTests.result }}"
          if [ "${{ needs.referenceTests.result }}" != "success" ]; then
            echo "❌ One or more referenceTests matrix jobs failed."
            exit 1
          fi
          echo "✅ All referenceTests matrix jobs passed."

  referenceTestsReport:
    runs-on: ubuntu-24.04
    needs: [changes, referenceTests]
    if: always() && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/collate-junit-reports
        continue-on-error: true
        if: always()
        with:
          stage_key: reference

  # DockerTags
  # develop = develop-jdk25

  publishDockerJDK25:
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    needs: [assemble, unitTests, integrationTests, propertyTests, acceptanceTests, referenceTests]
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-docker.yml
    with:
      assemble_run_id: ${{ github.run_id }}
      jdk_version: jdk25
      include_hash_in_docker: ${{ github.event_name == 'workflow_dispatch' && inputs.include_hash_in_docker || 'false' }}
    secrets: inherit

  publishDockerJDK26:
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    needs: [assemble, unitTests, integrationTests, propertyTests, acceptanceTests, referenceTests]
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-docker.yml
    with:
      assemble_run_id: ${{ github.run_id }}
      jdk_version: jdk26
      include_hash_in_docker: ${{ github.event_name == 'workflow_dispatch' && inputs.include_hash_in_docker || 'false' }}
    secrets: inherit

  # Release Distribution
  publishRelease:
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    needs: [assemble, unitTests, integrationTests, propertyTests, acceptanceTests, referenceTests]
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/publish-release.yml
    with:
      assemble_run_id: ${{ github.run_id }}
      publish_version: ${{ needs.assemble.outputs.publish-version }}
    secrets: inherit
