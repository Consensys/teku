name: "Validate Gradle Wrapper"
on:
  push:
    paths:
      - 'gradle/wrapper/**'
      - 'gradlew'
  pull_request:
    paths:
      - 'gradle/wrapper/**'
      - 'gradlew'

permissions:
  contents: read

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
