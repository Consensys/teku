name: "Validate Gradle Wrapper"
on:
  push:
    paths:
      - 'gradle/wrapper/**'
      - 'gradlew'
  pull_request:
    paths:
      - 'gradle/wrapper/**'
      - 'gradlew'

permissions:
  contents: read

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
