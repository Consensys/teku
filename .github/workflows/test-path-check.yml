name: "Test Path Check"
on:
  push:
    paths:
      - '**/*.java'
      - 'scripts/testcheck.sh'
  pull_request:
    paths:
      - '**/*.java'
      - 'scripts/testcheck.sh'

permissions:
  contents: read

jobs:
  check:
    name: "Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check test paths
        run: ./scripts/testcheck.sh
